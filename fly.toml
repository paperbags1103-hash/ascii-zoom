app = "ascii-zoom"
primary_region = "nrt"  # Tokyo, closest to Korea

[build]

[http_service]
  internal_port = 8765
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  protocols = ["tcp"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
